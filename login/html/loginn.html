<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Lunar Hotel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/logincss.css"/>
</head>
<body>
  
<div class="card">
  <div class="card-title">LOGIN</div>

  <div class="field">
    <label for="email">Email/No.hp</label>
    <input type="text" id="email" placeholder="Masukkan email atau no. HP"/>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Masukkan password"/>
  </div>

  <button class="btn-primary">LOGIN/MASUK</button>

  <div class="social-btns">
    <button class="btn-social btn-google">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.805 10.023H12v3.954h5.618c-.242 1.29-1.005 2.388-2.14 3.12v2.596h3.465c2.027-1.867 3.195-4.617 3.195-7.888 0-.627-.055-1.234-.153-1.782z"/><path d="M12 22c2.7 0 4.965-.896 6.62-2.426l-3.466-2.596c-.9.604-2.056.964-3.154.964-2.43 0-4.487-1.64-5.224-3.847H3.195v2.68A9.997 9.997 0 0 0 12 22z"/><path d="M6.776 14.095A5.982 5.982 0 0 1 6.45 12c0-.734.127-1.445.326-2.095V7.225H3.195A9.997 9.997 0 0 0 2 12c0 1.614.386 3.14 1.195 4.775l3.581-2.68z"/><path d="M12 6.058c1.37 0 2.6.47 3.568 1.394l2.674-2.675C16.963 3.298 14.698 2.4 12 2.4A9.997 9.997 0 0 0 3.195 7.225l3.581 2.68C7.513 7.698 9.57 6.058 12 6.058z"/></svg>
      Masuk dengan Google
    </button>

    <button class="btn-social btn-facebook">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.007 1.792-4.668 4.533-4.668 1.312 0 2.686.234 2.686.234v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      Masuk dengan Facebook
    </button>

    <button class="btn-social btn-whatsapp">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Masuk dengan WhatsApp
    </button>
  </div>

  <div class="register">
    Tidak memiliki akun?
    <button class="btn-daftar">DAFTAR</button>
  </div>
</div>

</body>
</html>
