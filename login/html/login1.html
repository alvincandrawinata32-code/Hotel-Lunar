<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login1.css">
</head>
<body>

<div class="container-fluid">
    <div class="row vh-100">

        <div class="col-md-6 left-side d-flex align-items-center">
            <div class="text-white p-5">
                <h1>Welcome to<br><b>LUNAR HOTEL</b></h1>
                <p>Nikmati suasana yang hangat, kamar yang nyaman, serta layanan yang dirancang untuk memberikan kenyamanan dalam setiap menginap.</p>
            </div>
        </div>

        <div class="col-md-6 d-flex justify-content-center align-items-center">
            <div class="card login-card shadow">

                <h5 class="text-center mb-3">LOGIN</h5>
                <input type="text" class="form-control mb-2" placeholder="Email / No. hp">
                <input type="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-primary w-100 mb-2">LOGIN/MASUK</button>

                <button class="btn btn-outline-dark w-100 mb-2">Masuk dengan aku</button>
                <button class="btn btn-outline-dark w-100 mb-2">Masuk dengan Facebook</button>
                <button class="btn btn-outline-dark w-100 mb-3">Masuk dengan WhatsApp</button>

                <p class="text-center small">Tidak memiliki akun?</p>
                <a href="login2.html" class="btn btn-secondary w-100">DAFTAR</a>

            </div>
        </div>

    </div>
</div>

</body>
</html>
