<style>
 * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #dfe6ea;
}

.page {
  width: 100%;
  min-height: 100vh;
}

/* Header */
.topbar {
  background: #062f57;
  color: white;
  padding: 20px 28px;
}

.topbar h1 {
  font-size: 22px;
  font-weight: 700;
}

/* Layout utama */
.main-layout {
  display: flex;
  min-height: calc(100vh - 76px);
  margin: 0 18px 0 0;
  gap: 18px;
}

/* Sidebar */
.sidebar {
  width: 245px;
  background: #6aa6f8;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.menu {
  display: flex;
  flex-direction: column;
}

.menu a {
  text-decoration: none;
  color: white;
  padding: 18px 20px;
  text-align: center;
  font-size: 16px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.1);
  background: #5f9ef4;
  transition: 0.3s;
}

.menu a:hover {
  background: #4b8eea;
}

.menu a.active {
  background: #062f57;
}

.sidebar-image {
  flex: 1;
  min-height: 360px;
  background: 
    linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.35)),
    url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=800&q=80');
  background-size: cover;
  background-position: center;
}

/* Content */
.content {
  flex: 1;
  padding: 22px 28px;
}

.profile-card {
  background: linear-gradient(90deg, #4f95f5, #345e9e);
  color: white;
  border-radius: 6px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  margin-bottom: 14px;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #2f80ed;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
}

.profile-card h2 {
  font-size: 18px;
  font-weight: 700;
}

.info-box {
  background: #f8f8f8;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  min-height: 90px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.label {
  font-size: 11px;
  color: #8b8b8b;
  margin-bottom: 8px;
}

.info-box p {
  font-size: 18px;
  font-weight: 700;
  color: #111;
}

/* Responsive */
@media (max-width: 900px) {
  .main-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }

  .sidebar-image {
    min-height: 200px;
  }

  .content {
    padding: 16px;
  }
}
