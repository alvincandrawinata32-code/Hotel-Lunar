<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login2.css">
</head>
<body>

<div class="container-fluid">
    <div class="row vh-100">

        <div class="col-md-6 d-flex justify-content-center align-items-center">
            <div class="card register-card shadow">

                <h5 class="text-center mb-3">MEMBUAT AKUN</h5>

                <form action="../php/insert.php" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Daftar</button>
                </form>

                <p class="text-center small">Sudah memiliki akun? 
                    <a href="login1.html">Masuk</a>
                </p>

                <button type="button" class="btn btn-secondary w-100 mt-2" onclick="window.location.href='../../index.html'">kembali ke beranda</button>

            </div>
        </div>

        <div class="col-md-6 right-side d-flex justify-content-end align-items-center">
    
    <div class="text-box text-white">
        <h1>Welcome to<br><b>LUNAR HOTEL</b></h1>
        <p>
            Nikmati suasana yang hangat, kamar yang nyaman, serta layanan yang dirancang untuk memberikan kenyamanan dalam setiap menginap.
        </p>
    </div>

</div>

    </div>
</div>

</body>
</html>
